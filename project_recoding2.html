<!DOCTYPE html>
<html>
<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 30px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: white;
      padding: 35px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 {
      color: #0047ab;
      text-align: center;
      margin-bottom: 25px;
    }
    .student-info {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 1.05em;
    }
    .course-label {
      background: #f8f9fa;
      color: #28a745;
      font-weight: 700;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 15px;
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #0047ab;
      color: white;
    }
    .total-row {
      font-weight: 700;
      background: #f8f9fa;
      color: #0047ab;
    }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    .submit-btn:hover {
      background: #218838;
    }
    .back-btn {
      display: block;
      width: fit-content;
      margin: 20px auto 0;
      text-decoration: none;
      color: #0047ab;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-book"></i> Subject Selection</h1>

    <div class="student-info">
      <strong>Student:</strong> <span id="displayName">-</span><br>
      <strong>Course & Year:</strong> <span id="displayCourse">-</span><br>
      <strong>Email:</strong> <span id="displayEmail">-</span>
    </div>

    <div id="courseLabel" class="course-label"></div>

    <form id="subjectForm">
      <table>
        <thead>
          <tr>
            <th>Select</th>
            <th>Subject Code</th>
            <th>Subject Name</th>
            <th>Units</th>
            <th>Total Hours(per semester)</th>
            <th>Lab Quantity</th>
            <th>Year Level</th>
          </tr>
        </thead>
        <tbody id="subjectTableBody"></tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="3"><strong>GRAND TOTAL:</strong></td>
            <td id="totalUnits">-</td>
            <td id="totalHours">-</td>
            <td id="totalLab">-</td>
            <td>-</td>
          </tr>
        </tfoot>
      </table>

      <button type="submit" class="submit-btn">✅ Finalize Subject Selection</button>
    </form>

    <a href="Project_re-coding.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Registration</a>
  </div>

    };

    // LOAD STUDENT DATA WHEN PAGE OPENS
    window.onload = function() {
      // GET DATA FROM BROWSER
      const database = JSON.parse(localStorage.getItem('dcitEnrollmentDB')) || { students: [] };
      const currentStudentId = localStorage.getItem('currentStudentId');

      // CHECK IF DATA EXISTS
      if (!currentStudentId || database.students.length === 0) {
        alert("⚠️ No student data found! Please register first.");
        window.location.href = 'student_registration.html';
        return;
      }

      // FIND CURRENT STUDENT
      const currentStudent = database.students.find(s => s.id == currentStudentId);

      if (currentStudent) {
        // DISPLAY STUDENT INFO
        document.getElementById('displayName').textContent = currentStudent.fullName;
        document.getElementById('displayCourse').textContent = `${currentStudent.course} - ${currentStudent.yearLevel}`;
        document.getElementById('displayEmail').textContent = currentStudent.email;

        // DISPLAY COURSE LABEL
        document.getElementById('courseLabel').textContent = `${currentStudent.course} ${currentStudent.yearLevel} Subjects`;

        // GET MATCHING SUBJECTS
        const filteredSubjects = courseSubjects[currentStudent.course].filter(sub => sub.year === currentStudent.yearLevel);

        // ADD SUBJECTS TO TABLE
        const tableBody = document.getElementById('subjectTableBody');
        filteredSubjects.forEach((sub, index) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td><input type="checkbox" class="subject-checkbox" data-index="${index}"></td>
            <td>${sub.code}</td>
            <td>${sub.name}</td>
            <td>${sub.units}</td>
            <td>${sub.hours}</td>
            <td>${sub.lab}</td>
            <td>${sub.year}</td>
          `;
          tableBody.appendChild(row);
        });

        // CALCULATE TOTALS WHEN CHECKBOX IS CLICKED
        const checkboxes = document.querySelectorAll('.subject-checkbox');
        checkboxes.forEach(checkbox => {
          checkbox.addEventListener('change', updateTotals);
        });

        // INITIAL TOTAL CALCULATION
        updateTotals();
      } else {
        alert("⚠️ Student data not found! Please register again.");
        window.location.href = 'student_registration.html';
      }
    };
  

    // FUNCTION TO UPDATE GRAND TOTALS
    function updateTotals() {
      const checkboxes = document.querySelectorAll('.subject-checkbox:checked');
      let totalUnits = 0;
      let totalHours = 0;
      let totalLab = 0;

      // Get current student's course and year
      const course = document.getElementById('displayCourse').textContent.split(' - ')[0];
      const year = document.getElementById('displayCourse').textContent.split(' - ')[1];
      const filteredSubjects = courseSubjects[course].filter(sub => sub.year === year);

      checkboxes.forEach(checkbox => {
        const index = parseInt(checkbox.dataset.index);
        const subject = filteredSubjects[index];
        
        if (subject) {
          totalUnits += subject.units;
          totalHours += subject.hours;
          totalLab += subject.lab;
        }
      });

      document.getElementById('totalUnits').textContent = totalUnits;
      document.getElementById('totalHours').textContent = totalHours;
      document.getElementById('totalLab').textContent = totalLab;
    }

    // SUBMIT FORM
    document.getElementById('subjectForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // Get current student's course and year
      const course = document.getElementById('displayCourse').textContent.split(' - ')[0];
      const year = document.getElementById('displayCourse').textContent.split(' - ')[1];
      const filteredSubjects = courseSubjects[course].filter(sub => sub.year === year);

      // Get selected subjects with full details
      const checkboxes = document.querySelectorAll('.subject-checkbox:checked');
      const selectedSubjects = [];
      checkboxes.forEach(checkbox => {
        const index = parseInt(checkbox.dataset.index);
        const subject = filteredSubjects[index];
        
        if (subject) {
          selectedSubjects.push({
            name: `${subject.code} - ${subject.name}`,
            labQuantity: subject.lab,
            units: subject.units,
            totalHours: subject.hours
          });
        }
      });

      // Update database
      const database = JSON.parse(localStorage.getItem('dcitEnrollmentDB')) || { students: [] };
      const currentStudentId = localStorage.getItem('currentStudentId');
      const currentStudent = database.students.find(s => s.id == currentStudentId);
      
      if (currentStudent) {
        currentStudent.subjects = selectedSubjects;
        localStorage.setItem('dcitEnrollmentDB', JSON.stringify(database));
        alert("✅ Subject selection finalized successfully! Redirecting to Database Summary...");
        window.location.href = 'thankYou.html';
      } else {
        alert("⚠️ Student not found! Cannot save selected subjects.");
      }
    });
  </script>
